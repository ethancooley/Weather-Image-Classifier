<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Classifier</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>

  <div class="app">

    <!-- Left panel: upload + controls -->
    <div class="left-panel">

      <div class="logo-row">
        <div class="logo-icon"><i class="ti ti-cloud" aria-hidden="true"></i></div>
        <div>
          <div class="logo-text">Weather Classifier</div>
          <div class="logo-sub">EfficientNetB3 · GradCAM</div>
        </div>
      </div>

      <!-- Upload zone (shown before image selected) -->
      <div
        id="uploadZone"
        class="upload-zone"
        onclick="document.getElementById('fileInput').click()"
        ondrop="handleDrop(event)"
        ondragover="handleDragOver(event)"
        ondragleave="handleDragLeave()"
        role="button"
        aria-label="Upload image"
        tabindex="0"
      >
        <div class="upload-icon"><i class="ti ti-upload" aria-hidden="true"></i></div>
        <div class="upload-title">Drop an image or click to browse</div>
        <div class="upload-hint">JPG · PNG · WEBP</div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
      </div>

      <!-- Preview (shown after image selected) -->
      <div id="previewContainer" class="preview-container">
        <img id="preview" class="preview-img" alt="Selected image preview">
        <div class="preview-badge">
          <i class="ti ti-photo" aria-hidden="true"></i>
          <span id="fileName"></span>
        </div>
      </div>

      <!-- Classify button -->
      <button class="classify-btn" id="classifyBtn" onclick="classify()" disabled>
        <i class="ti ti-sparkles" aria-hidden="true"></i>
        Classify image
      </button>

    </div>

    <!-- Right panel: results -->
    <div class="right-panel">

      <div class="top-bar">
        <div class="section-label">Results</div>
        <div class="model-pill">EfficientNetB3</div>
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state">
        <i class="ti ti-photo-scan empty-icon" aria-hidden="true"></i>
        Upload an image to see the prediction and GradCAM explanation
      </div>

      <!-- Results (hidden until classify runs) -->
      <div id="resultsContent" class="results-content">

        <!-- Prediction card -->
        <div class="result-card">
          <div class="prediction-row">
            <div class="prediction-label" id="predLabel">—</div>
            <div class="confidence-badge" id="confBadge">—</div>
          </div>
          <div class="confidence-sub">Model confidence score</div>
          <div class="confidence-bar-track">
            <div class="confidence-bar-fill" id="confBar" style="width: 0%"></div>
          </div>

          <div class="divider"></div>

          <div class="section-label">Top 5 predictions</div>
          <div id="bars"></div>
        </div>

        <!-- GradCAM card -->
        <div class="heatmap-card">
          <div class="heatmap-header">
            <div class="heatmap-title">
              <i class="ti ti-eye" aria-hidden="true"></i>
              GradCAM explanation
            </div>
            <div class="heatmap-sub">what the model focused on</div>
          </div>
          <div class="heatmap-body">
            <div class="heatmap-col">
              <div class="heatmap-col-label">Original</div>
              <img id="origImg" class="heatmap-img" alt="Original image">
            </div>
            <div class="heatmap-col">
              <div class="heatmap-col-label">Activation map</div>
              <img id="heatmapImg" class="heatmap-img" alt="GradCAM heatmap overlay">
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>

</body>
</html>
